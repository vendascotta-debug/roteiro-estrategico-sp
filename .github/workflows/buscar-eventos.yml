name: Buscar Eventos SP Automaticamente

on:
  schedule:
    # Roda todo dia às 10h horário de Brasília (13h UTC)
    - cron: '0 13 * * *'
  workflow_dispatch: # Permite rodar manualmente

jobs:
  buscar-eventos:
    runs-on: ubuntu-latest
    
    steps:
      - name: Buscar eventos e publicar no Firebase
        run: |
          cat << 'PYEOF' > buscar.py
          import urllib.request
          import urllib.error
          import json
          import os
          from datetime import datetime, timezone, timedelta

          CLAUDE_KEY = os.environ['CLAUDE_API_KEY']
          FIREBASE_URL = os.environ['FIREBASE_URL']

          # Data de hoje no horário de Brasília
          br_tz = timezone(timedelta(hours=-3))
          hoje = datetime.now(br_tz)
          data_hoje = hoje.strftime('%Y-%m-%d')
          data_br = hoje.strftime('%d/%m/%Y')
          dia_semana = ['Segunda','Terça','Quarta','Quinta','Sexta','Sábado','Domingo'][hoje.weekday()]

          print(f"Buscando eventos para: {dia_semana}, {data_br}")

          prompt = f"""Você é um especialista em eventos de São Paulo para motoristas de aplicativo. 
Hoje é {dia_semana}, {data_br}.

Pesquise na internet os eventos acontecendo HOJE em São Paulo usando múltiplas buscas:

1. FEIRAS E EXPOSIÇÕES: Busque feiras no Anhembi, Expo Center Norte, São Paulo Expo, Imigrantes, Transamerica Expo. Ex: APAS Show, Hospitalar, FEIMEC, BFSHOW, ENIC, etc.

2. FUTEBOL: Busque jogos de hoje no ge.globo.com, espn.com.br ou google. Inclua Corinthians (Neo Química Arena), Palmeiras (Allianz Parque), São Paulo (MorumBIS), Santos (Vila Belmiro) e times do interior.

3. SHOWS E MÚSICA: Busque shows em cartaz hoje em São Paulo - Allianz Parque, Espaço das Américas, Audio, Blue Note, Tom Brasil, Vibra São Paulo, Arena Anhembi, etc.

4. TEATRO E MUSICAIS: Busque peças e musicais em cartaz hoje - Teatro Renault, Teatro Bradesco, FAAP, SESC, etc.

5. EVENTOS NOS PARQUES: Busque eventos em Ibirapuera, Villa-Lobos, Trianon, Estadual Alberto Löfgren, etc.

6. VIRADA CULTURAL: Se hoje for entre 23-25/05/2026, inclua programação da Virada Cultural SP.

7. CINEMA: Estreias de filmes importantes na semana.

8. BALADAS E BARES: Eventos noturnos importantes - Vila Madalena, Itaim, Pinheiros, República.

9. EVENTOS ESPECIAIS: Maratonas, feiras gastronômicas, festivais, eventos na Paulista.

10. AEROPORTOS E TERMINAIS: Fluxo esperado em GRU, Congonhas e Rodoviária do Tietê.

REGRAS IMPORTANTES:
- Só inclua eventos que acontecem HOJE {data_br}
- Para futebol, verifique o horário e local CORRETO
- Inclua o máximo de eventos possível
- Para eventos noturnos (shows, baladas), coloque horário de saída estimado

Responda APENAS com JSON puro, sem markdown, sem explicações:
{{"eventos":[
  {{"nome":"Nome do Evento","venue":"Nome do Local","endereco":"Endereço completo, Bairro, São Paulo - SP","horario":"HH:MM - HH:MM","saida":"Saída HH:MM - HH:MM","publico":"50000","crowd":3,"categoria":"feira","emoji":"💼","gps":"https://maps.google.com/?q=Local+Sao+Paulo"}},
  {{"nome":"Palmeiras x Cerro Porteño","venue":"Allianz Parque","endereco":"Av. Francisco Matarazzo, 1705, Água Branca, São Paulo - SP","horario":"21:30 - 23:30","saida":"Saída 23:30 - 01:00","publico":"43000","crowd":3,"categoria":"futebol","emoji":"⚽","gps":"https://maps.google.com/?q=Allianz+Parque+Sao+Paulo"}}
]}}

Valores para crowd: 1=até 5mil pessoas, 2=5mil a 20mil, 3=acima de 20mil
Valores para categoria: feira, futebol, show, teatro, parque, cinema, balada, outro
Valores para emoji: ⚽=futebol, 🎵=show/música, 🎭=teatro/musical, 💼=feira/negócios, 🛒=varejo, 🏥=saúde, 🎪=festival/parque, 🍺=bar/balada, 🎬=cinema, ✈️=aeroporto, 🚌=rodoviária"""

          payload = json.dumps({
              "model": "claude-sonnet-4-5",
              "max_tokens": 8000,
              "tools": [{"type": "web_search_20250305", "name": "web_search"}],
              "messages": [{"role": "user", "content": prompt}]
          }).encode('utf-8')

          req = urllib.request.Request(
              'https://api.anthropic.com/v1/messages',
              data=payload,
              headers={
                  'Content-Type': 'application/json',
                  'x-api-key': CLAUDE_KEY,
                  'anthropic-version': '2023-06-01'
              }
          )

          try:
              with urllib.request.urlopen(req, timeout=180) as resp:
                  data = json.loads(resp.read())
          except urllib.error.HTTPError as e:
              print(f"Erro HTTP: {e.code} - {e.read()}")
              exit(1)

          # Extrai texto da resposta
          texto = ''
          for block in data.get('content', []):
              if block.get('type') == 'text':
                  texto += block.get('text', '')

          print(f"Resposta IA (primeiros 800 chars): {texto[:800]}")

          # Parse JSON
          eventos = []
          texto_limpo = texto.replace('```json','').replace('```','').strip()
          
          try:
              parsed = json.loads(texto_limpo)
              eventos = parsed.get('eventos', parsed if isinstance(parsed, list) else [])
          except:
              import re
              match = re.search(r'\{.*?"eventos".*?\}', texto_limpo, re.DOTALL)
              if match:
                  try:
                      eventos = json.loads(match.group()).get('eventos', [])
                  except:
                      pass
              if not eventos:
                  arr_match = re.search(r'\[.*?\]', texto_limpo, re.DOTALL)
                  if arr_match:
                      try:
                          eventos = json.loads(arr_match.group())
                      except:
                          pass

          if not eventos:
              print("Nenhum evento encontrado!")
              exit(0)

          print(f"Total de eventos encontrados: {len(eventos)}")
          for ev in eventos:
              print(f"  - {ev.get('nome','?')} | {ev.get('venue','?')} | {ev.get('horario','?')}")

          # Publica no Firebase
          firebase_data = {}
          for i, ev in enumerate(eventos):
              firebase_data[f'ev{i}'] = {
                  'nome': ev.get('nome', ''),
                  'venue': ev.get('venue', ''),
                  'endereco': ev.get('endereco', ''),
                  'horario': ev.get('horario', ''),
                  'saida': ev.get('saida', ''),
                  'publico': str(ev.get('publico', '—')),
                  'crowd': int(ev.get('crowd', 2)),
                  'categoria': ev.get('categoria', 'outro'),
                  'emoji': ev.get('emoji', '📍'),
                  'gps': ev.get('gps', ''),
                  'data': data_hoje,
                  'ativo': True
              }

          fb_url = f"{FIREBASE_URL}/eventos/{data_hoje}.json"
          fb_payload = json.dumps(firebase_data, ensure_ascii=False).encode('utf-8')
          
          fb_req = urllib.request.Request(
              fb_url,
              data=fb_payload,
              method='PUT',
              headers={'Content-Type': 'application/json'}
          )

          with urllib.request.urlopen(fb_req, timeout=30) as resp:
              print(f"✅ Firebase OK: {len(firebase_data)} eventos publicados para {data_hoje}!")

          PYEOF
          python3 buscar.py
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          FIREBASE_URL: ${{ secrets.FIREBASE_URL }}
